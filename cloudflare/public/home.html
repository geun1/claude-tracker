<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>claude-tracker</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  body{margin:0;background:#0b0d10;color:#e7e9ee;font:14px/1.5 system-ui,-apple-system,Segoe UI,sans-serif;
       display:flex;align-items:center;justify-content:center;min-height:100vh}
  .box{text-align:center}
  .spin{display:inline-block;width:24px;height:24px;border:2px solid #2a2f37;border-top-color:#fb923c;
        border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err{color:#fca5a5;margin-top:12px}
  a{color:#60a5fa}
  input{background:#11141a;border:1px solid #2a2f37;color:#e7e9ee;padding:8px 12px;border-radius:6px;font:inherit}
  button{background:#fb923c;color:#0b0d10;border:0;padding:8px 16px;border-radius:6px;font:inherit;font-weight:600;cursor:pointer;margin-left:6px}
</style>
<script src="/loader.js"></script>
</head>
<body>
<div class="box">
  <div class="spin"></div>
  <div id="msg" style="margin-top:12px;color:#9aa3b2">로딩…</div>
  <div id="form" style="display:none;margin-top:18px">
    <div style="margin-bottom:8px">토큰을 입력하세요</div>
    <input id="tok" type="password" size="40" placeholder="tracker token" />
    <button onclick="saveTok()">확인</button>
    <div style="margin-top:14px;font-size:12px;color:#6b7280">
      처음 사용한다면 터미널에서: <code>curl -fsSL <span id="base"></span>/install.sh | bash</code>
    </div>
  </div>
</div>
<script>
function getTok(){
  const u = new URL(location.href);
  const fromUrl = u.searchParams.get("token");
  if (fromUrl) { localStorage.setItem("claude-tracker-token", fromUrl); u.searchParams.delete("token"); history.replaceState({}, "", u.toString()); return fromUrl; }
  return localStorage.getItem("claude-tracker-token") || "";
}
function saveTok(){
  const v = document.getElementById("tok").value.trim();
  if (v) { localStorage.setItem("claude-tracker-token", v); location.reload(); }
}
async function go(){
  document.getElementById("base").textContent = location.origin;
  const tok = getTok();
  if (!tok) {
    document.getElementById("msg").textContent = "인증이 필요합니다";
    document.getElementById("form").style.display = "block";
    return;
  }
  try {
    const r = await fetch("/api/me", { headers: { Authorization: "Bearer " + tok } });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const me = await r.json();
    const t = "?token=" + encodeURIComponent(tok);
    if (me.role === "admin") location.replace("/dashboard.html" + t);
    else if (me.role === "manager" && me.team) location.replace("/t/" + encodeURIComponent(me.team) + t);
    else location.replace("/u/" + encodeURIComponent(me.email) + t);
  } catch (e) {
    document.getElementById("msg").innerHTML = '<div class="err">⚠ ' + e.message + ' — 토큰을 다시 입력해 주세요</div>';
    document.getElementById("form").style.display = "block";
    localStorage.removeItem("claude-tracker-token");
  }
}
go();
</script>
</body>
</html>
